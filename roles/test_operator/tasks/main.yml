- name: Ensure test_operator folder exists
  ansible.builtin.file:
    path: "{{ cifmw_test_operator_artifacts_basedir }}"
    state: directory
    mode: "0755"
    recurse: true
    owner: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    group: "{{ ansible_user | default(lookup('env', 'USER')) }}"

- name: Patch CSV to change test-operator version if needed
  when:
    - cifmw_test_operator_index != ""
    - not cifmw_test_operator_dry_run | bool
  block:
    - name: Get full name of the openstack-operator csv
      ansible.builtin.shell: >-
        oc get ClusterServiceVersion
        -l operators.coreos.com/openstack-operator.openstack-operators
        --all-namespaces
        -o json |
        jq '.items[0].metadata.name'
      register: openstack_operator_csv_name

    - name: Get index of test-operator image
      ansible.builtin.shell: >-
          oc get ClusterServiceVersion {{ openstack_operator_csv_name.stdout }}
          -o json |
          jq '.spec.install.spec.deployments[0].spec.template.spec.containers[0].env |
          to_entries[] |
          select(.value.name == "RELATED_IMAGE_TEST_OPERATOR_MANAGER_IMAGE_URL").key'
      register: image_index

    - name: Patch test-operator version in CSV
      ansible.builtin.command:
        cmd: >-
          oc patch ClusterServiceVersion {{ openstack_operator_csv_name.stdout }}
          --type='json'
          -p='[{"op": "replace", "path": "/spec/install/spec/deployments/0/spec/template/spec/containers/0/env/{{ image_index.stdout }}/value", "value": " {{ cifmw_test_operator_index }} "}]'

    - name: Get full name of test-operator-controller-manager pod
      ansible.builtin.shell: >-
        oc get pods -n {{ cifmw_test_operator_controller_namespace }} -o json |
        jq -r '.items[].metadata.name | select(test("test-operator"))'
      register: test_operator_controller_name

    - name: Wait until the test-operator-controller-manager is reloaded
      kubernetes.core.k8s_info:
        kubeconfig: "{{ cifmw_openshift_kubeconfig }}"
        api_key: "{{ cifmw_openshift_token | default(omit)}}"
        context: "{{ cifmw_openshift_context | default(omit) }}"
        namespace: "{{ cifmw_test_operator_controller_namespace }}"
        kind: Pod
      register: pod_list
      delay: 10
      retries: 20
      until: >-
        {{
          not (
            pod_list.resources |
            map(attribute='metadata.name') |
            select('match', test_operator_controller_name.stdout) |
            list
          )
        }}

- name: Call test stages loop
  when: not cifmw_test_operator_dry_run | bool
  ansible.builtin.include_tasks: stages.yml
  loop: "{{ cifmw_test_operator_stages }}"
  loop_control:
    loop_var: _stage_vars

- name: Delete all resources created by the role
  ansible.builtin.include_tasks: cleanup.yml
  when: cifmw_test_operator_cleanup | bool and not cifmw_test_operator_dry_run | bool

- name: Fail when any tests failed
  when:
    - not cifmw_test_operator_dry_run | bool
    - cifmw_test_operator_fail_on_test_failure | bool
  ansible.builtin.assert:
    that:
      - item.value
    success_msg: "{{ item.key }} tests passed"
    fail_msg: "{{ item.key }} tests failed"
  loop: "{{ test_operator_results | default({}) | dict2items }}"
